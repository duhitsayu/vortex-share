services:
  - type: web
    name: vortex
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_URL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 100
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: DB_PATH
        value: /opt/render/project/src/data/vortex.db
    disk:
      name: vortex-storage
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
