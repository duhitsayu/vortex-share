<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — Vortex</title>
  <meta name="description" content="Download a shared file from Vortex — secure, temporary file sharing." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="page">

  <header>
    <div class="logo">
      <a href="/" style="display:inline-flex;align-items:center;gap:12px;text-decoration:none;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <h1>Vortex</h1>
      </a>
    </div>
  </header>

  <!-- LOADING -->
  <div class="card download-card" id="loadingState">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading file information…</p>
    </div>
  </div>

  <!-- FILE READY TO DOWNLOAD -->
  <div class="card download-card" id="downloadState" style="display:none;">
    <div class="download-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>

    <h2 id="dlFileName">—</h2>

    <div class="download-meta">
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span id="dlFileSize">—</span>
      </span>
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="dlExpiry">—</span>
      </span>
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span id="dlDownloads">0 downloads</span>
      </span>
    </div>

    <!-- PASSWORD SECTION -->
    <div class="password-section" id="passwordSection" style="display:none;">
      <label for="dlPassword">This file is password-protected</label>
      <div class="password-input-wrap">
        <span class="lock-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="dlPassword" placeholder="Enter password" autocomplete="off" />
      </div>
    </div>

    <!-- ERROR FOR PASSWORD -->
    <div class="error-box" id="dlErrorBox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="dlErrorMsg">Incorrect password.</span>
    </div>

    <button class="btn-download" id="downloadBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download File
    </button>

    <!-- QR RE-SHARE -->
    <div class="download-qr-section">
      <p class="share-again-text">Share this file with someone else</p>
      <div class="qr-box show" id="dlQrBox"></div>
      <div class="link-row" style="margin-top:12px;">
        <span class="link-url" id="dlShareUrl"></span>
        <button class="btn-copy" id="dlCopyBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
    </div>
  </div>

  <!-- EXPIRED / NOT FOUND -->
  <div class="card download-card" id="expiredState" style="display:none;">
    <div class="expired-state">
      <div class="expired-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 id="expiredTitle">File Not Available</h2>
      <p id="expiredMsg">This file may have expired or does not exist.</p>
      <a href="/" class="btn-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Share your own file
      </a>
    </div>
  </div>

</div>

<footer>© 2026 Vortex · Secure, temporary file sharing</footer>
<div class="toast" id="toast">✅ Link copied to clipboard!</div>

<script src="/js/download.js"></script>
</body>
</html>
